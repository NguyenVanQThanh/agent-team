<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --bg-grad-1: #1e293b;
        --bg-grad-2: #0f172a;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-border: rgba(255, 255, 255, 0.12);
        --panel-hover: rgba(255, 255, 255, 0.10);
        --text: #f8fafc;
        --text-dim: #94a3b8;
        --accent: #38bdf8;
        --accent-strong: #0ea5e9;
        --shadow: 0 10px 30px rgba(2, 6, 23, 0.35);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, "Noto Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 20% -10%, #1d4ed833 0%, transparent 60%),
          radial-gradient(900px 500px at 110% 110%, #0ea5e933 0%, transparent 55%),
          linear-gradient(160deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* --- Top bar (always visible) --- */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--panel-border);
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(8px);
      }

      .topbar h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: 0.01em;
      }

      .topbar .spacer { flex: 1; }

      .back-btn {
        appearance: none;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        font: inherit;
        font-weight: 600;
        padding: 8px 14px;
        border-radius: 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
      }

      .back-btn:hover { background: var(--panel-hover); border-color: var(--accent); }
      .back-btn:active { transform: translateY(1px); }
      .back-btn[hidden] { display: none !important; }

      /* --- Main content area --- */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      /* --- Dashboard view (cards) --- */
      .dashboard {
        padding: 48px 24px 64px;
        max-width: 1080px;
        width: 100%;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .hero h2 {
        font-size: clamp(1.75rem, 3vw, 2.5rem);
        margin: 0 0 8px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .hero p {
        margin: 0;
        color: var(--text-dim);
        font-size: 1rem;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
      }

      .card {
        appearance: none;
        text-align: left;
        font: inherit;
        color: var(--text);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 28px 24px;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: transform 160ms ease, background 160ms ease,
          border-color 160ms ease, box-shadow 160ms ease;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 180px;
      }

      .card:hover {
        transform: translateY(-4px);
        background: var(--panel-hover);
        border-color: var(--accent);
        box-shadow: 0 16px 40px rgba(2, 6, 23, 0.45);
      }

      .card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .card:active { transform: translateY(-1px); }

      .card .emoji {
        font-size: 2.25rem;
        line-height: 1;
      }

      .card h3 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
      }

      .card p {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .card .play {
        margin-top: auto;
        color: var(--accent);
        font-weight: 600;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* --- Embedded game view --- */
      .game-frame-wrap {
        flex: 1;
        display: none;
        min-height: 0;
        background: #ffffff;
      }

      .game-frame-wrap.active { display: flex; }

      .game-frame-wrap iframe {
        flex: 1;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      .dashboard.hidden { display: none; }

      /* --- Mobile tweaks --- */
      @media (max-width: 540px) {
        .topbar { padding: 14px 16px; }
        .dashboard { padding: 32px 16px 48px; }
        .card { padding: 22px 18px; min-height: 150px; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1>🎮 Game Dashboard</h1>
      <span class="spacer"></span>
      <button id="backBtn" class="back-btn" type="button" hidden aria-label="Back to dashboard">
        ← Back
      </button>
    </header>

    <main>
      <section id="dashboard" class="dashboard" aria-label="Game selection">
        <div class="hero">
          <h2>Pick a game</h2>
          <p>Two tiny browser games. Click a card to play.</p>
        </div>

        <div class="card-grid" role="list">
          <button
            type="button"
            class="card"
            role="listitem"
            data-game="tic-tac-toe"
            data-src="TicTacToe.html"
            aria-label="Play Tic Tac Toe"
          >
            <span class="emoji" aria-hidden="true">❌⭕</span>
            <h3>Tic Tac Toe</h3>
            <p>Classic two-player 3×3 grid. First to three in a row wins.</p>
            <span class="play" aria-hidden="true">Play →</span>
          </button>

          <button
            type="button"
            class="card"
            role="listitem"
            data-game="rock-paper-scissors"
            data-src="RockPaperScissors.html"
            aria-label="Play Rock Paper Scissors"
          >
            <span class="emoji" aria-hidden="true">✊📄✂️</span>
            <h3>Rock Paper Scissors</h3>
            <p>Beat the computer. Score is tracked across rounds.</p>
            <span class="play" aria-hidden="true">Play →</span>
          </button>
        </div>
      </section>

      <section id="gameFrameWrap" class="game-frame-wrap" aria-label="Game">
        <iframe
          id="gameFrame"
          title="Game"
          src="about:blank"
          allow="autoplay"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>
    </main>

    <script>
      (function () {
        const dashboard = document.getElementById("dashboard");
        const frameWrap = document.getElementById("gameFrameWrap");
        const frame = document.getElementById("gameFrame");
        const backBtn = document.getElementById("backBtn");
        const cards = document.querySelectorAll(".card[data-src]");

        function openGame(src, label) {
          frame.src = src;
          frame.title = label || "Game";
          dashboard.classList.add("hidden");
          frameWrap.classList.add("active");
          backBtn.hidden = false;
          document.title = (label ? label + " — " : "") + "Game Dashboard";
          // Move focus to the back button so keyboard users land somewhere useful.
          backBtn.focus({ preventScroll: true });
          history.replaceState({ view: "game", src: src }, "");
        }

        function showDashboard() {
          frameWrap.classList.remove("active");
          dashboard.classList.remove("hidden");
          backBtn.hidden = true;
          // Drop the iframe so the embedded React app fully unmounts.
          frame.src = "about:blank";
          document.title = "Game Dashboard";
          history.replaceState({ view: "dashboard" }, "");
        }

        cards.forEach(function (card) {
          card.addEventListener("click", function () {
            const src = card.getAttribute("data-src");
            const label = card.querySelector("h3")?.textContent?.trim();
            openGame(src, label);
          });
        });

        backBtn.addEventListener("click", showDashboard);

        // Esc returns to the dashboard from a game.
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && frameWrap.classList.contains("active")) {
            showDashboard();
          }
        });

        history.replaceState({ view: "dashboard" }, "");
      })();
    </script>
  </body>
</html>
