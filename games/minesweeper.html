<!--
  @file        minesweeper.html
  @description Standalone Minesweeper game page. UI shell + inline styles; all
               game logic lives in js/minesweeper.js. Renders a difficulty
               selector, mine counter, timer, smiley reset, board, score HUD,
               and an overlay for win/lose messages (score shown on both).

  @createdAt   2026-05-20
  @createdBy   leader
  @updatedAt   2026-05-20
  @updatedBy   dev9
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💣</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 12px;
    }
    a.back {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      align-self: flex-start;
    }
    a.back:hover { color: #fbbf24; }
    h1 {
      margin: 0 0 16px;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls label { font-size: 0.9rem; color: #94a3b8; }
    .controls select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .hud {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 8px 14px;
      border-radius: 10px;
      font-family: "Courier New", monospace;
      font-size: 1.2rem;
      margin-bottom: 14px;
    }
    .hud .digits {
      background: #000;
      color: #ef4444;
      padding: 2px 8px;
      border-radius: 4px;
      min-width: 56px;
      text-align: center;
      letter-spacing: 0.08em;
    }
    .hud button#smiley {
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      border: 1px solid #334155;
      background: #0f172a;
      border-radius: 8px;
      cursor: pointer;
      line-height: 1;
    }
    .hud button#smiley:hover { background: #1e293b; }
    #board-wrap {
      overflow: auto;
      max-width: 100%;
      padding: 4px;
    }
    #board {
      display: grid;
      gap: 2px;
      background: #334155;
      padding: 4px;
      border-radius: 6px;
      user-select: none;
    }
    .cell {
      width: 28px;
      height: 28px;
      background: #475569;
      border: 1px solid #64748b;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.08s ease;
    }
    .cell:hover:not(.revealed) { background: #64748b; }
    .cell.revealed {
      background: #1e293b;
      border-color: #1e293b;
      cursor: default;
    }
    .cell.revealed.mine { background: #b91c1c; border-color: #7f1d1d; }
    .cell.flagged { color: #f97316; }
    .cell[data-n="1"] { color: #60a5fa; }
    .cell[data-n="2"] { color: #4ade80; }
    .cell[data-n="3"] { color: #f87171; }
    .cell[data-n="4"] { color: #c084fc; }
    .cell[data-n="5"] { color: #fb923c; }
    .cell[data-n="6"] { color: #2dd4bf; }
    .cell[data-n="7"] { color: #e2e8f0; }
    .cell[data-n="8"] { color: #94a3b8; }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    #overlay.hidden { display: none; }
    #overlay .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 32px 28px;
      text-align: center;
      max-width: 360px;
    }
    #overlay.win .panel { border-color: #4ade80; }
    #overlay.lose .panel { border-color: #f87171; }
    .overlay-msg { font-size: 1.15rem; margin-bottom: 10px; }
    .overlay-score { font-size: 1.4rem; font-weight: 700; color: #fbbf24; margin-bottom: 18px; }
    .overlay-btn {
      background: linear-gradient(90deg, #fbbf24, #f87171);
      color: #0f172a;
      border: none;
      padding: 10px 24px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .overlay-btn:hover { transform: scale(1.04); }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back to dashboard</a>
  <h1>💣 Minesweeper</h1>

  <div class="controls">
    <label for="difficulty">Difficulty:</label>
    <select id="difficulty">
      <option value="beginner">Beginner (9×9, 10 mines)</option>
      <option value="intermediate">Intermediate (16×16, 40 mines)</option>
      <option value="expert">Expert (16×30, 99 mines)</option>
    </select>
  </div>

  <div class="hud">
    <span class="digits" id="mine-count" title="Mines remaining">010</span>
    <button id="smiley" title="New game">🙂</button>
    <span class="digits" id="timer" title="Elapsed seconds">000</span>
    <span style="color:#94a3b8;font-size:0.85rem;padding:0 2px;">⭐</span>
    <span class="digits" id="score-display" title="Score" style="min-width:68px;">0000</span>
  </div>

  <div id="board-wrap"><div id="board"></div></div>

  <div id="overlay" class="hidden">
    <div class="panel">
      <div class="overlay-msg">Game over.</div>
      <div class="overlay-score" id="overlay-score">Score: 0</div>
      <button class="overlay-btn" onclick="document.getElementById('smiley').click()">New game</button>
    </div>
  </div>

  <script src="js/minesweeper.js"></script>
</body>
</html>
